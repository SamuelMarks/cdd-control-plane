name: CI

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cdd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout cdd-control-plane
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev gcc libpq-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Install diesel_cli and setup database
        uses: taiki-e/install-action@v2
        with:
          tool: diesel_cli
      - name: Setup Database
        run: diesel setup --database-url postgres://postgres:password@localhost:5432/cdd_test

      - name: Run checks
        run: cargo check --verbose

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests & coverage
        run: cargo tarpaulin --verbose --workspace --timeout 120 --out xml

      - name: Build docs
        run: cargo doc --no-deps

  release:
    name: Build & Release Binaries
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cdd-control-plane
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cdd-control-plane
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cdd-control-plane.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev gcc libpq-dev

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> $GITHUB_ENV
          echo "PQ_LIB_DIR=$(brew --prefix libpq)/lib" >> $GITHUB_ENV


      - name: Install libpq (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libpq:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a cdd-control-plane-${{ matrix.target }}.zip ${{ matrix.artifact_name }}
          else
            tar -czvf cdd-control-plane-${{ matrix.target }}.tar.gz ${{ matrix.artifact_name }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: target/${{ matrix.target }}/release/cdd-control-plane-${{ matrix.target }}.*
          name: Release ${{ github.ref_name }}

  update_latest_tag:
    name: Update Latest Tag
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Update latest tag (Local only, push disabled per policy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest ${{ github.sha }}
