name: CI

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cdd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout cdd-control-plane
        uses: actions/checkout@v4

      - name: Checkout cdd-ctl
        uses: actions/checkout@v4
        with:
          repository: SamuelMarks/cdd-ctl
          path: cdd-ctl

      - name: Checkout cdd-web-ui
        uses: actions/checkout@v4
        with:
          repository: SamuelMarks/cdd-web-ui
          path: cdd-web-ui

      - name: Checkout cdd-engine
        uses: actions/checkout@v4
        with:
          repository: SamuelMarks/cdd-engine
          path: cdd-engine

      - name: Checkout cdd-publisher
        uses: actions/checkout@v4
        with:
          repository: SamuelMarks/cdd-publisher
          path: cdd-publisher

      - name: Checkout cdd-gateway
        uses: actions/checkout@v4
        with:
          repository: SamuelMarks/cdd-gateway
          path: cdd-gateway

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev gcc libpq-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Install diesel_cli and setup database
        uses: taiki-e/install-action@v2
        with:
          tool: diesel_cli
      - name: Setup Database
        run: diesel setup --database-url postgres://postgres:password@localhost:5432/cdd_test

      - name: Run checks
        run: cargo check --verbose

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests & coverage
        run: cargo tarpaulin --verbose --workspace --timeout 120 --out xml

      - name: Build docs
        run: cargo doc --no-deps

      - name: Build debian Docker image
        working-directory: cdd-ctl
        run: |
          sed -i 's/apt-get install -y /apt-get install -y git /' debian.Dockerfile
          docker build -t cdd-ctl:debian -f debian.Dockerfile .

      - name: Build alpine Docker image
        working-directory: cdd-ctl
        run: |
          sed -i 's/apk add --no-cache /apk add --no-cache git /' alpine.Dockerfile
          docker build -t cdd-ctl:alpine -f alpine.Dockerfile .

  release:
    name: Build & Release Binaries
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cdd-control-plane
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cdd-control-plane
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cdd-control-plane.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev gcc libpq-dev

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: brew install libpq

      - name: Install libpq (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libpq:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          name: Release ${{ github.ref_name }}

  update_latest_tag:
    name: Update Latest Tag
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update latest tag (Local only, push disabled per policy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest ${{ github.sha }}
